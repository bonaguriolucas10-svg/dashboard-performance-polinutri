<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Polinutri Performance Dashboard</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/variables.css">

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">

            <h2>POLINUTRI</h2>
            <span>Performance Dashboard</span>

        </div>

        <nav>

            <button class="menu active">
                Dashboard
            </button>

            <button class="menu">
                Granjas
            </button>

            <button class="menu">
                Lotes
            </button>

            <button class="menu">
                Benchmark
            </button>

            <button class="menu">
                Relatórios
            </button>

        </nav>

    </aside>

    <main>

        <header class="topbar">

            <div>

                <h1>
                    Dashboard Performance
                </h1>

                <p>
                    Polinutri Nutrição Animal
                </p>

            </div>

            <div class="filters">

                <select id="fase">

                    <option>Creche</option>

                    <option>Crescimento + Terminação</option>

                </select>

                <select id="periodo">

                    <option>Últimos 30 dias</option>

                    <option>Ano</option>

                </select>

            </div>

        </header>

        <section class="cards">

            <div class="card">

                <h3>GPD</h3>

                <strong id="gpd">0 g</strong>

            </div>

            <div class="card">

                <h3>CA</h3>

                <strong id="ca">0</strong>

            </div>

            <div class="card">

                <h3>Mortalidade</h3>

                <strong id="mort">0%</strong>

            </div>

            <div class="card">

                <h3>Peso Final</h3>

                <strong id="peso">0 kg</strong>

            </div>

        </section>

        <section class="charts">

            <div class="chart">

                <canvas id="chartGPD"></canvas>

            </div>

            <div class="chart">

                <canvas id="chartCA"></canvas>

            </div>

        </section>

        <section class="table">

            <table>

                <thead>

                <tr>

                    <th>Granja</th>
                    <th>GPD</th>
                    <th>CA</th>
                    <th>Mortalidade</th>
                    <th>Peso Final</th>

                </tr>

                </thead>

                <tbody id="tableData">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="js/data.js"></script>
<script src="js/filters.js"></script>
<script src="js/charts.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/app.js"></script>

</body>

</html>
